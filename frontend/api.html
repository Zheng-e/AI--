<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API 并行改色工作台</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <div class="nav-brand">
        <div class="brand-badge">FX</div>
        <span>改色工作台</span>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link">本地改色</a>
        <a href="/api-recolor" class="nav-link active">API 并行改色</a>
        <a href="/dashboard" class="nav-link">看板</a>
      </div>
    </div>
  </nav>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">API</div>
        <div>
          <h1>API 并行改色</h1>
          <p>云端 API · 多组合并发处理</p>
        </div>
      </div>

      <section class="card">
        <h3>目标服务器</h3>
        <select id="serverSelect">
          <option value="">自动 (负载均衡)</option>
          <option value="http://192.168.0.186:8000">服务器 A (186)</option>
          <option value="http://192.168.0.34:8000">服务器 B (34)</option>
        </select>
        <div id="serverStatus" class="meta"></div>
      </section>

      <section class="card required-card">
        <h3>必填项</h3>
        <label>商品图文件夹</label>
        <input id="imageFiles" type="file" accept="image/*" webkitdirectory directory multiple />
        <label>颜色定义 TXT 文件</label>
        <input id="colorsTxtFile" type="file" accept=".txt,text/plain" />
      </section>

      <section class="card">
        <h3>API 设置</h3>
        <label>API 模型</label>
        <select id="apiModel"></select>
        <div id="apiHealth" class="meta"></div>
      </section>

      <section class="card required-card compact-actions">
        <button id="submitBtn" type="button" class="full-width">开始 API 并行改色</button>
      </section>
    </aside>

    <main class="content">
      <section class="hero">
        <div>
          <p class="eyebrow">云端并行改色</p>
          <h2>上传文件夹和颜色 TXT，按图片 × 颜色并发生成</h2>
        </div>
        <div class="status-pill">Cloud · API</div>
      </section>

      <details class="panel collapsible">
        <summary>
          <div class="section-head summary-head">
            <h2>可选参数</h2>
            <span class="summary-tip">折叠</span>
          </div>
        </summary>
        <div class="collapsible-body">
          <div class="option-grid">
            <div class="side-card">
              <h3>商品名称</h3>
              <input id="garmentName" placeholder="可留空，优先读取 TXT 的 GARMENT" />
            </div>
            <div class="side-card">
              <h3>手动颜色</h3>
              <textarea id="manualColors" rows="5" placeholder="亮绿色: #ccd560&#10;粉色: #e271a5"></textarea>
            </div>
          </div>
          <div class="side-card">
            <h3>提示词模板</h3>
            <textarea id="promptTemplate" rows="7" placeholder="留空则使用默认模板。可使用 {GARMENT} {GARMENT_CATEGORY} {RGB_VALUE} {HEX_VALUE}"></textarea>
          </div>
        </div>
      </details>

      <section class="panel">
        <div class="section-head">
          <h2>API 任务列表</h2>
          <div class="section-actions"><button id="refreshBtn">刷新任务</button></div>
        </div>
        <div id="submitStatus" class="submit-status"></div>
        <div id="jobsList" class="jobs-list"></div>
      </section>
    </main>
  </div>
  <script src="/static/api.js"></script>
</body>
</html>
